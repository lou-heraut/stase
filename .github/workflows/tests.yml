name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        pandas: ["pandas>=2.2,<3", "pandas>=3"]
        include:
          # borne basse déclarée : Python 3.10 + pandas 2.2
          - python-version: "3.10"
            pandas: "pandas>=2.2,<3"
    name: pytest (py${{ matrix.python-version }}, ${{ matrix.pandas }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install "${{ matrix.pandas }}" numpy scipy pytest
          pip install -e . --no-deps
      - name: Run tests
        run: pytest

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src tests benchmarks
